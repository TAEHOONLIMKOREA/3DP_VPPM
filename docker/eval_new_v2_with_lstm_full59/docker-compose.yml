# eval_new_v2_with_lstm_full59 — 단일 GPU, 단일 service.
#
# 학습된 LSTM_FULL59 모델 (vppm_lstm_dual_img_16_dscnn_8_cad_8_scan_8_sensor_1) 을
# 신규 build "2023-03-15 AMMTO Spatial Variation Baseline.hdf5" ([new_v2]) 에 적용해
# part-level 인장 물성 (YS/UTS/TE) 예측 · GT 비교. UE 는 GT 부재 — prediction 만 산출.
#
# 3 단계:
#   features  — 21-feat 추출 + valid SV 식별 + GT 로드 → features/features.npz
#   cache     — 6 시퀀스 캐시 빌드 (_AMMTO_v2.h5)
#   evaluate  — 5-fold ensemble inference + part-level mean + GT 비교
#   all       — 위 3 단계 일괄 (기본값)
#
# 사전조건:
#   - ORNL_Data 전체 (read-only 마운트)
#   - vppm_lstm_dual_img_16_dscnn_8_cad_8_scan_8_sensor_1 학습 완료:
#       Sources/pipeline_outputs/experiments/vppm_lstm_dual_img_16_dscnn_8_cad_8_scan_8_sensor_1/
#         models/*.pt
#         features/normalization.json
#
# 사전 mkdir (호스트에서 1회 — docker daemon 자동 생성 시 root 소유):
#   mkdir -p ../../Sources/pipeline_outputs/experiments/eval_new_v2_with_lstm_full59/{cache,features,results}
#
# 사용법:
#   cd docker/eval_new_v2_with_lstm_full59
#   docker compose up -d --build       # 백그라운드 전체 실행 (all)
#   docker compose logs -f             # 실시간 로그
#   docker compose down                # 정리
#
# 단계/GPU 변경:
#   EVAL_NEW_V2_PHASE=features docker compose up -d --build
#   EVAL_NEW_V2_PHASE=cache    docker compose up -d --build
#   EVAL_NEW_V2_PHASE=evaluate docker compose up -d --build
#   NVIDIA_VISIBLE_DEVICES=1   docker compose up -d --build
#   EVAL_NEW_V2_EXTRA=--quick  docker compose up -d --build   # evaluate 만 첫 256 SV

services:
  eval:
    build:
      context: ../..
      dockerfile: docker/eval_new_v2_with_lstm_full59/Dockerfile
    image: vppm-eval-new-v2:gpu
    container_name: vppm-eval-new-v2
    runtime: nvidia
    user: "${UID_GID:-1000:1000}"
    restart: "no"
    shm_size: "4gb"
    working_dir: /workspace
    environment:
      PYTHONPATH: /workspace
      HOME: /tmp
      NVIDIA_VISIBLE_DEVICES: "${NVIDIA_VISIBLE_DEVICES:-0}"
      EVAL_NEW_V2_PHASE: "${EVAL_NEW_V2_PHASE:-all}"
      EVAL_NEW_V2_EXTRA: "${EVAL_NEW_V2_EXTRA:-}"
    volumes:
      - /etc/passwd:/etc/passwd:ro
      - /etc/group:/etc/group:ro
      - ../../venv:/workspace/venv:ro
      # 입력 데이터 (read-only)
      - ../../ORNL_Data:/workspace/ORNL_Data:ro
      # 학습된 모델 + 정규화 통계 (read-only)
      - ../../Sources/pipeline_outputs/experiments/vppm_lstm_dual_img_16_dscnn_8_cad_8_scan_8_sensor_1:/workspace/Sources/pipeline_outputs/experiments/vppm_lstm_dual_img_16_dscnn_8_cad_8_scan_8_sensor_1:ro
      # 산출물 (rw)
      - ../../Sources/pipeline_outputs/experiments/eval_new_v2_with_lstm_full59:/workspace/Sources/pipeline_outputs/experiments/eval_new_v2_with_lstm_full59:rw
    command:
      - sh
      - -c
      - |
        set -e
        VENV_PY=/workspace/venv/bin/python
        EXP=eval_new_v2_with_lstm_full59

        # ── 사전 검증 ────────────────────────────────────────────────
        # 1) venv
        if [ ! -x "$$VENV_PY" ]; then
          echo "[$$EXP] FATAL: $$VENV_PY 없음 — 호스트 venv 가 마운트되지 않았습니다" >&2; exit 1
        fi

        # 2) new_v2 HDF5
        NEW_V2_HDF5="/workspace/ORNL_Data/Co-Registered In-Situ and Ex-Situ Dataset/[new_v2] (Peregrine v2023-10)/2023-03-15 AMMTO Spatial Variation Baseline.hdf5"
        if [ ! -f "$$NEW_V2_HDF5" ]; then
          echo "[$$EXP] FATAL: new_v2 HDF5 없음: $$NEW_V2_HDF5" >&2; exit 1
        fi

        # 3) 학습된 모델 .pt ≥ 1개
        MODELS_DIR="/workspace/Sources/pipeline_outputs/experiments/vppm_lstm_dual_img_16_dscnn_8_cad_8_scan_8_sensor_1/models"
        if [ -z "$$(ls -A "$$MODELS_DIR"/*.pt 2>/dev/null)" ]; then
          echo "[$$EXP] FATAL: $$MODELS_DIR 에 .pt 파일 없음 — fullstack 학습이 먼저 완료돼야 합니다" >&2; exit 1
        fi

        # 4) 정규화 통계
        NORM_JSON="/workspace/Sources/pipeline_outputs/experiments/vppm_lstm_dual_img_16_dscnn_8_cad_8_scan_8_sensor_1/features/normalization.json"
        if [ ! -f "$$NORM_JSON" ]; then
          echo "[$$EXP] FATAL: normalization.json 없음: $$NORM_JSON" >&2; exit 1
        fi

        # 5) 출력 디렉터리 쓰기 가능
        OUT="/workspace/Sources/pipeline_outputs/experiments/eval_new_v2_with_lstm_full59"
        if [ ! -d "$$OUT" ]; then
          echo "[$$EXP] FATAL: $$OUT 가 마운트되지 않음 (rw 필요)" >&2; exit 1
        fi
        if ! touch "$$OUT/.write_test" 2>/dev/null; then
          echo "[$$EXP] FATAL: $$OUT 쓰기 실패 — UID/권한 확인 (호스트에서 mkdir -p 후 chown taehoon:taehoon)" >&2; exit 1
        fi
        rm -f "$$OUT/.write_test"
        mkdir -p "$$OUT/cache" "$$OUT/features" "$$OUT/results"

        # ── 환경 정보 ─────────────────────────────────────────────────
        $$VENV_PY -c "import torch,sys;print(f'[$$EXP] python={sys.version.split()[0]} torch={torch.__version__} cuda={torch.cuda.is_available()} devs={torch.cuda.device_count()}')"
        echo "[$$EXP] phase=$${EVAL_NEW_V2_PHASE} gpu=$${NVIDIA_VISIBLE_DEVICES} extra=$${EVAL_NEW_V2_EXTRA}"

        # ── 실행 ──────────────────────────────────────────────────────
        if [ "$${EVAL_NEW_V2_PHASE}" = "all" ]; then
          $$VENV_PY -m Sources.vppm.eval_new_v2_with_lstm_full59.run --all $${EVAL_NEW_V2_EXTRA}
        else
          $$VENV_PY -m Sources.vppm.eval_new_v2_with_lstm_full59.run --phase $${EVAL_NEW_V2_PHASE} $${EVAL_NEW_V2_EXTRA}
        fi

        echo "[$$EXP] Done. 산출물 → Sources/pipeline_outputs/experiments/eval_new_v2_with_lstm_full59/"
