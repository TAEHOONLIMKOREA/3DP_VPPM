# VPPM-1DCNN 학습 — depthwise 1D CNN z-압축 (groups=21) → baseline MLP(21→128→1) 재사용.
# features → train → evaluate 순차 실행.
# 산출물 → Sources/pipeline_outputs/experiments/vppm_1dcnn/
#
# 사전조건:
#   - Sources/pipeline_outputs/features/all_features.npz   (baseline 피처)
#   - (train/evaluate/all phase 의 경우) Sources/pipeline_outputs/experiments/vppm_1dcnn/features/features_seq.npz
#
# 사용법:
#
#   cd docker/1dcnn
#   docker compose up -d --build       # 백그라운드 실행 (SSH 끊겨도 계속됨)
#   docker compose logs -f             # 로그 실시간 확인
#   docker compose down                # 끝났거나 중단하고 싶을 때 정리
#
# 단계/GPU 변경:
#   NVIDIA_VISIBLE_DEVICES=2 docker compose up -d --build
#   VPPM_1DCNN_PHASE=train docker compose up -d --build
#   VPPM_1DCNN_EXTRA=--quick docker compose up -d --build
services:
  vppm_1dcnn:
    build:
      context: ../..
      dockerfile: docker/1dcnn/Dockerfile
    image: vppm-1dcnn:gpu
    runtime: nvidia
    user: "${UID_GID:-1000:1000}"
    restart: "no"
    environment:
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-0}
      - PYTHONPATH=/workspace
      - HOME=/tmp
      - VPPM_1DCNN_PHASE=${VPPM_1DCNN_PHASE:-features}
      - VPPM_1DCNN_EXTRA=${VPPM_1DCNN_EXTRA:-}
    volumes:
      - /etc/passwd:/etc/passwd:ro
      - /etc/group:/etc/group:ro
      - ../../venv:/workspace/venv:ro
      # ORNL HDF5 원본 데이터 (features phase 에서 HDF5 파싱에 필요)
      - ../../ORNL_Data:/workspace/ORNL_Data:ro
      # baseline features (features phase 에서 z-평균 검증용, 입력) - read-only
      - ../../Sources/pipeline_outputs/features:/workspace/Sources/pipeline_outputs/features:ro
      # 1DCNN 산출물 - rw
      - ../../Sources/pipeline_outputs/experiments/vppm_1dcnn:/workspace/Sources/pipeline_outputs/experiments/vppm_1dcnn:rw
    shm_size: "4gb"
    working_dir: /workspace
    command:
      - sh
      - -c
      - |
        set -e
        VENV_PY=/workspace/venv/bin/python
        # ── 사전 검증 ──────────────────────────────────────────────────
        if [ ! -x "$$VENV_PY" ]; then
          echo "[1dcnn] FATAL: $$VENV_PY 없음 — 호스트 venv 가 마운트되지 않았습니다" >&2
          exit 1
        fi
        if [ ! -f /workspace/Sources/pipeline_outputs/features/all_features.npz ]; then
          echo "[1dcnn] FATAL: Sources/pipeline_outputs/features/all_features.npz not found." >&2
          echo "[1dcnn]        Run \`cd docker/baseline && docker compose up --build\` (or run_pipeline --phase features) first." >&2
          exit 1
        fi
        if [ "$${VPPM_1DCNN_PHASE}" = "train" ] || [ "$${VPPM_1DCNN_PHASE}" = "evaluate" ] || [ "$${VPPM_1DCNN_PHASE}" = "all" ]; then
          FEATURES_SEQ=/workspace/Sources/pipeline_outputs/experiments/vppm_1dcnn/features/features_seq.npz
          if [ ! -f "$$FEATURES_SEQ" ]; then
            echo "[1dcnn] FATAL: features_seq.npz not found." >&2
            echo "[1dcnn]        Run \`VPPM_1DCNN_PHASE=features docker compose up --build\` first." >&2
            exit 1
          fi
        fi
        OUT=/workspace/Sources/pipeline_outputs/experiments/vppm_1dcnn
        if [ ! -d "$$OUT" ]; then
          mkdir -p "$$OUT"
        fi
        if ! touch "$$OUT/.write_test" 2>/dev/null; then
          echo "[1dcnn] FATAL: $$OUT 쓰기 실패 — UID/권한 확인" >&2
          exit 1
        fi
        rm -f "$$OUT/.write_test"
        $$VENV_PY -c "import torch,sys;print(f'[1dcnn] python={sys.version.split()[0]} torch={torch.__version__} cuda={torch.cuda.is_available()} devs={torch.cuda.device_count()}')"
        # ── 실행 ──────────────────────────────────────────────────────
        echo "[1dcnn] phase=$${VPPM_1DCNN_PHASE} extra=$${VPPM_1DCNN_EXTRA}"
        $$VENV_PY -m Sources.vppm.1dcnn.run --phase $${VPPM_1DCNN_PHASE} $${VPPM_1DCNN_EXTRA}
        echo "[1dcnn] Done. Results → Sources/pipeline_outputs/experiments/vppm_1dcnn/results/"
