# VPPM-LSTM-Dual-4 학습 — 21 baseline + visible/0 LSTM(d_embed=4) + visible/1 LSTM(d_embed=4) → 29 feat MLP
# train → evaluate 순차 실행. 캐시는 dual 와 공유 (재추출 안 함).
# 산출물 → Sources/pipeline_outputs/experiments/vppm_lstm_dual_4/
#
# 사전조건:
#   - Sources/pipeline_outputs/features/all_features.npz                   (baseline 피처)
#   - Sources/pipeline_outputs/experiments/vppm_lstm/cache/                (visible/0 캐시)
#   - Sources/pipeline_outputs/experiments/vppm_lstm_dual/cache/           (visible/1 캐시)
#
# 사용법:
#
#   cd docker/lstm_dual_4
#   docker compose up -d --build       # 백그라운드 실행 (SSH 끊겨도 계속됨)
#   docker compose logs -f             # 로그 실시간 확인
#   docker compose down                # 끝났거나 중단하고 싶을 때 정리
#
# 단계/GPU 변경:
#   NVIDIA_VISIBLE_DEVICES=2 docker compose up -d --build
#   LSTM_DUAL_4_PHASE=evaluate docker compose up -d --build
#   LSTM_DUAL_4_EXTRA=--quick docker compose up -d --build
services:
  vppm-lstm-dual-4:
    build:
      context: ../..
      dockerfile: docker/lstm_dual_4/Dockerfile
    image: vppm-lstm-dual-4:gpu
    runtime: nvidia
    user: "${UID_GID:-1000:1000}"
    restart: "no"
    environment:
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-0}
      - PYTHONPATH=/workspace
      - HOME=/tmp
      - LSTM_DUAL_4_PHASE=${LSTM_DUAL_4_PHASE:-all}             # all | train | evaluate
      - LSTM_DUAL_4_EXTRA=${LSTM_DUAL_4_EXTRA:-}                # e.g. "--quick"
    volumes:
      - /etc/passwd:/etc/passwd:ro
      - /etc/group:/etc/group:ro
      - ../../venv:/workspace/venv:ro
      # baseline features (입력) - read-only
      - ../../Sources/pipeline_outputs/features:/workspace/Sources/pipeline_outputs/features:ro
      # visible/0 캐시 (입력) - read-only
      - ../../Sources/pipeline_outputs/experiments/vppm_lstm:/workspace/Sources/pipeline_outputs/experiments/vppm_lstm:ro
      # visible/1 캐시 (입력) - read-only — dual 의 cache 디렉토리 재사용
      - ../../Sources/pipeline_outputs/experiments/vppm_lstm_dual:/workspace/Sources/pipeline_outputs/experiments/vppm_lstm_dual:ro
      # LSTM-Dual-4 산출물 - rw
      - ../../Sources/pipeline_outputs/experiments/vppm_lstm_dual_4:/workspace/Sources/pipeline_outputs/experiments/vppm_lstm_dual_4:rw
    shm_size: "4gb"
    working_dir: /workspace
    command:
      - sh
      - -c
      - |
        set -e
        VENV_PY=/workspace/venv/bin/python
        # ── 사전 검증 ──────────────────────────────────────────────────
        if [ ! -x "$$VENV_PY" ]; then
          echo "[lstm_dual_4] FATAL: $$VENV_PY 없음 — 호스트 venv 가 마운트되지 않았습니다" >&2
          exit 1
        fi
        if [ ! -f /workspace/Sources/pipeline_outputs/features/all_features.npz ]; then
          echo "[lstm_dual_4] FATAL: all_features.npz 없음 — baseline 피처 추출 먼저 완료해야 합니다" >&2
          exit 1
        fi
        V0_CACHE=/workspace/Sources/pipeline_outputs/experiments/vppm_lstm/cache
        if [ ! -d "$$V0_CACHE" ] || [ -z "$$(ls -A $$V0_CACHE/crop_stacks_B1.*.h5 2>/dev/null)" ]; then
          echo "[lstm_dual_4] FATAL: visible/0 캐시 없음 ($$V0_CACHE) — 먼저 docker/lstm 으로 cache 단계 실행하세요" >&2
          exit 1
        fi
        V1_CACHE=/workspace/Sources/pipeline_outputs/experiments/vppm_lstm_dual/cache
        if [ ! -d "$$V1_CACHE" ] || [ -z "$$(ls -A $$V1_CACHE/crop_stacks_v1_B1.*.h5 2>/dev/null)" ]; then
          echo "[lstm_dual_4] FATAL: visible/1 캐시 없음 ($$V1_CACHE) — 먼저 docker/lstm_dual 로 cache_v1 단계 실행하세요" >&2
          exit 1
        fi
        OUT=/workspace/Sources/pipeline_outputs/experiments/vppm_lstm_dual_4
        if [ ! -d "$$OUT" ]; then
          echo "[lstm_dual_4] FATAL: $$OUT 가 마운트되지 않음 (rw 필요)" >&2
          exit 1
        fi
        if ! touch "$$OUT/.write_test" 2>/dev/null; then
          echo "[lstm_dual_4] FATAL: $$OUT 쓰기 실패 — UID/권한 확인" >&2
          exit 1
        fi
        rm -f "$$OUT/.write_test"
        mkdir -p "$$OUT/models" "$$OUT/results" "$$OUT/features"
        $$VENV_PY -c "import torch,sys;print(f'[lstm_dual_4] python={sys.version.split()[0]} torch={torch.__version__} cuda={torch.cuda.is_available()} devs={torch.cuda.device_count()}')"
        # ── 실행 ──────────────────────────────────────────────────────
        echo "[lstm_dual_4] phase=$${LSTM_DUAL_4_PHASE} extra=$${LSTM_DUAL_4_EXTRA}"
        if [ "$${LSTM_DUAL_4_PHASE}" = "all" ]; then
          $$VENV_PY -m Sources.vppm.lstm_dual_4.run --all $${LSTM_DUAL_4_EXTRA}
        else
          $$VENV_PY -m Sources.vppm.lstm_dual_4.run --phase $${LSTM_DUAL_4_PHASE} $${LSTM_DUAL_4_EXTRA}
        fi
        echo "[lstm_dual_4] Done. Results → Sources/pipeline_outputs/experiments/vppm_lstm_dual_4/results/"
