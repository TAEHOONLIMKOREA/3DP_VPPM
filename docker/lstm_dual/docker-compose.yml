# VPPM-LSTM-Dual 학습 — 21 baseline + visible/0 LSTM 임베딩 + visible/1 LSTM 임베딩 → 23 feat MLP
# cache_v1 → train → evaluate 순차 실행.
# 산출물 → Sources/pipeline_outputs/experiments/vppm_lstm_dual/
#
# 사전조건:
#   - Sources/pipeline_outputs/features/all_features.npz       (baseline 피처)
#   - Sources/pipeline_outputs/experiments/vppm_lstm/cache/    (visible/0 캐시 — 기존 lstm 산출물)
#
# 사용법 — `.env` 파일에 GPU/UID 설정해두고 한 줄로:
#
#   cd docker/lstm_dual
#   docker compose up -d --build       # 백그라운드 실행 (SSH 끊겨도 계속됨)
#   docker compose logs -f             # 로그 실시간 확인
#   docker compose down                # 끝났거나 중단하고 싶을 때 정리
#
# 다른 GPU/단계로 돌리고 싶으면 .env 수정 또는 인라인 환경변수:
#   NVIDIA_VISIBLE_DEVICES=2 docker compose up -d --build
#   LSTM_DUAL_PHASE=cache_v1 LSTM_DUAL_EXTRA=--quick docker compose up -d --build
services:
  vppm-lstm-dual:
    build:
      context: ../..
      dockerfile: docker/lstm_dual/Dockerfile
    image: vppm-lstm-dual:gpu
    runtime: nvidia
    user: "${UID_GID:-1000:1000}"
    restart: "no"
    environment:
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-0}
      - PYTHONPATH=/workspace
      - HOME=/tmp
      - LSTM_DUAL_PHASE=${LSTM_DUAL_PHASE:-all}             # all | cache_v1 | train | evaluate
      - LSTM_DUAL_EXTRA=${LSTM_DUAL_EXTRA:-}                # e.g. "--quick"
    volumes:
      - /etc/passwd:/etc/passwd:ro
      - /etc/group:/etc/group:ro
      - ../../venv:/workspace/venv:ro
      # 원본 HDF5 (cache_v1 단계에서 필요) - read-only
      - ../../ORNL_Data_Origin:/workspace/ORNL_Data_Origin:ro
      # baseline features (입력) - read-only
      - ../../Sources/pipeline_outputs/features:/workspace/Sources/pipeline_outputs/features:ro
      # 기존 visible/0 캐시 (입력) - read-only
      - ../../Sources/pipeline_outputs/experiments/vppm_lstm:/workspace/Sources/pipeline_outputs/experiments/vppm_lstm:ro
      # LSTM-Dual 산출물 - rw
      - ../../Sources/pipeline_outputs/experiments/vppm_lstm_dual:/workspace/Sources/pipeline_outputs/experiments/vppm_lstm_dual:rw
    shm_size: "4gb"
    working_dir: /workspace
    command:
      - sh
      - -c
      - |
        set -e
        VENV_PY=/workspace/venv/bin/python
        # ── 사전 검증 ──────────────────────────────────────────────────
        if [ ! -x "$$VENV_PY" ]; then
          echo "[lstm_dual] FATAL: $$VENV_PY 없음 — 호스트 venv 가 마운트되지 않았습니다" >&2
          exit 1
        fi
        if [ "$${LSTM_DUAL_PHASE}" != "cache_v1" ]; then
          if [ ! -f /workspace/Sources/pipeline_outputs/features/all_features.npz ]; then
            echo "[lstm_dual] FATAL: all_features.npz 없음 — baseline 피처 추출 먼저 완료해야 합니다" >&2
            exit 1
          fi
          # train/evaluate 시 v0 캐시 필수
          V0_CACHE=/workspace/Sources/pipeline_outputs/experiments/vppm_lstm/cache
          if [ ! -d "$$V0_CACHE" ] || [ -z "$$(ls -A $$V0_CACHE/crop_stacks_B1.*.h5 2>/dev/null)" ]; then
            echo "[lstm_dual] FATAL: visible/0 캐시 없음 ($$V0_CACHE) — 먼저 lstm 컨테이너로 cache 단계 실행하세요" >&2
            exit 1
          fi
        fi
        if [ "$${LSTM_DUAL_PHASE}" = "cache_v1" ] || [ "$${LSTM_DUAL_PHASE}" = "all" ]; then
          if [ ! -d /workspace/ORNL_Data_Origin ]; then
            echo "[lstm_dual] FATAL: ORNL_Data_Origin/ 가 마운트되지 않음 (cache_v1 단계 필수)" >&2
            exit 1
          fi
        fi
        OUT=/workspace/Sources/pipeline_outputs/experiments/vppm_lstm_dual
        if [ ! -d "$$OUT" ]; then
          echo "[lstm_dual] FATAL: $$OUT 가 마운트되지 않음 (rw 필요)" >&2
          exit 1
        fi
        if ! touch "$$OUT/.write_test" 2>/dev/null; then
          echo "[lstm_dual] FATAL: $$OUT 쓰기 실패 — UID/권한 확인" >&2
          exit 1
        fi
        rm -f "$$OUT/.write_test"
        mkdir -p "$$OUT/cache" "$$OUT/models" "$$OUT/results" "$$OUT/features"
        $$VENV_PY -c "import torch,sys;print(f'[lstm_dual] python={sys.version.split()[0]} torch={torch.__version__} cuda={torch.cuda.is_available()} devs={torch.cuda.device_count()}')"
        # ── 실행 ──────────────────────────────────────────────────────
        echo "[lstm_dual] phase=$${LSTM_DUAL_PHASE} extra=$${LSTM_DUAL_EXTRA}"
        if [ "$${LSTM_DUAL_PHASE}" = "all" ]; then
          $$VENV_PY -m Sources.vppm.lstm_dual.run --all $${LSTM_DUAL_EXTRA}
        else
          $$VENV_PY -m Sources.vppm.lstm_dual.run --phase $${LSTM_DUAL_PHASE} $${LSTM_DUAL_EXTRA}
        fi
        echo "[lstm_dual] Done. Results → Sources/pipeline_outputs/experiments/vppm_lstm_dual/results/"
