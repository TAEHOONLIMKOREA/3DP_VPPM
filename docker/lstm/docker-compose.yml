# docker-compose.yml — VPPM-LSTM (IMPLEMENTATION_PLAN_LSTM.md §10)
#
# 핵심 전략: 호스트 venv (torch 2.11.0 + sm_120) 를 bind mount.
# Docker 안에서 패키지를 설치하지 않음 → 빌드 수 초, 네트워크 불필요.
#
services:
  vppm-lstm:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: vppm-lstm:gpu
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - PYTHONPATH=/workspace
      - LSTM_CACHE_DIR=/tmp/image_stacks
    volumes:
      # ─── 호스트 venv (torch 2.11.0 + 전체 패키지) ─────────
      - ../venv:/workspace/venv:ro

      # ─── 읽기 전용 (원본 + 재사용 산출물) ─────────────────
      - ../ORNL_Data_Origin:/workspace/ORNL_Data_Origin:ro
      - ../Sources/pipeline_outputs/features:/workspace/Sources/pipeline_outputs/features:ro
      - ../Sources/pipeline_outputs/models:/workspace/Sources/pipeline_outputs/models:ro

      # ─── 쓰기 가능 (신규 산출물만, 총 ~35MB) ──────────────
      - ../Sources/pipeline_outputs/lstm_embeddings:/workspace/Sources/pipeline_outputs/lstm_embeddings:rw
      - ../Sources/pipeline_outputs/models_lstm:/workspace/Sources/pipeline_outputs/models_lstm:rw
      - ../Sources/pipeline_outputs/results/vppm_lstm:/workspace/Sources/pipeline_outputs/results/vppm_lstm:rw

    # image_stacks 캐시는 tmpfs(RAM) 에만 존재 → 호스트 디스크 0
    tmpfs:
      - /tmp:size=8g
    shm_size: "4gb"
    working_dir: /workspace
