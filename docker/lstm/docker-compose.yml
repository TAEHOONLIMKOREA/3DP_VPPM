# VPPM-LSTM 학습 — 21 baseline 피처 + per-SV CNN+LSTM 임베딩 1-dim → 22 feat MLP
# cache → train → evaluate 순차 실행. 산출물 → Sources/pipeline_outputs/experiments/vppm_lstm_single/
#
# 사용법 — `.env` 파일에 GPU/UID 설정해두고 (이미 docker/lstm/.env 존재) 한 줄로:
#
#   cd docker/lstm
#   docker compose up -d --build       # 백그라운드 실행 (SSH 끊겨도 계속됨)
#   docker compose logs -f             # 로그 실시간 확인 (Ctrl+C 로 빠져나오면 컨테이너는 계속 돎)
#   docker compose down                # 끝났거나 중단하고 싶을 때 정리
#
# 다른 GPU/단계로 돌리고 싶으면 .env 수정 또는 인라인 환경변수:
#   NVIDIA_VISIBLE_DEVICES=2 docker compose up -d --build
#   LSTM_PHASE=cache LSTM_EXTRA=--quick docker compose up -d --build
services:
  vppm-lstm:
    build:
      context: ../..
      dockerfile: docker/lstm/Dockerfile
    image: vppm-lstm:gpu
    runtime: nvidia
    user: "${UID_GID:-1000:1000}"
    restart: "no"      # 학습 끝나면 종료 (실패해도 자동 재시작 안 함)
    environment:
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-0}
      - PYTHONPATH=/workspace
      - HOME=/tmp
      - LSTM_PHASE=${LSTM_PHASE:-all}             # all | cache | train | evaluate
      - LSTM_EXTRA=${LSTM_EXTRA:-}                # e.g. "--quick"
    volumes:
      - /etc/passwd:/etc/passwd:ro
      - /etc/group:/etc/group:ro
      - ../../venv:/workspace/venv:ro
      # 원본 HDF5 (cache 단계에서 필요) - read-only
      # ORNL_Data/ 전체를 마운트 → config.HDF5_DIR 가 [baseline] (Peregrine v2023-11) 서브폴더를 가리킴
      - ../../ORNL_Data:/workspace/ORNL_Data:ro
      # baseline features (입력) - read-only
      - ../../Sources/pipeline_outputs/features:/workspace/Sources/pipeline_outputs/features:ro
      # LSTM 산출물 - rw
      - ../../Sources/pipeline_outputs/experiments/vppm_lstm_single:/workspace/Sources/pipeline_outputs/experiments/vppm_lstm_single:rw
    shm_size: "4gb"
    working_dir: /workspace
    command:
      - sh
      - -c
      - |
        set -e
        VENV_PY=/workspace/venv/bin/python
        # ── 사전 검증 (이전 entrypoint.sh 의 로직을 인라인) ──────────────
        if [ ! -x "$$VENV_PY" ]; then
          echo "[lstm] FATAL: $$VENV_PY 없음 — 호스트 venv 가 마운트되지 않았습니다" >&2
          exit 1
        fi
        if [ "$${LSTM_PHASE}" != "cache" ]; then
          if [ ! -f /workspace/Sources/pipeline_outputs/features/all_features.npz ]; then
            echo "[lstm] FATAL: all_features.npz 없음 — baseline 피처 추출 먼저 완료해야 합니다" >&2
            exit 1
          fi
        fi
        if [ "$${LSTM_PHASE}" = "cache" ] || [ "$${LSTM_PHASE}" = "all" ]; then
          HDF5_DIR="/workspace/ORNL_Data/Co-Registered In-Situ and Ex-Situ Dataset/[baseline] (Peregrine v2023-11)"
          if [ ! -d "$$HDF5_DIR" ]; then
            echo "[lstm] FATAL: $$HDF5_DIR 가 마운트되지 않음 (cache 단계 필수)" >&2
            exit 1
          fi
        fi
        LSTM_OUT=/workspace/Sources/pipeline_outputs/experiments/vppm_lstm_single
        if [ ! -d "$$LSTM_OUT" ]; then
          echo "[lstm] FATAL: $$LSTM_OUT 가 마운트되지 않음 (rw 필요)" >&2
          exit 1
        fi
        if ! touch "$$LSTM_OUT/.write_test" 2>/dev/null; then
          echo "[lstm] FATAL: $$LSTM_OUT 쓰기 실패 — UID/권한 확인" >&2
          exit 1
        fi
        rm -f "$$LSTM_OUT/.write_test"
        mkdir -p "$$LSTM_OUT/cache" "$$LSTM_OUT/models" "$$LSTM_OUT/results" "$$LSTM_OUT/features"
        $$VENV_PY -c "import torch,sys;print(f'[lstm] python={sys.version.split()[0]} torch={torch.__version__} cuda={torch.cuda.is_available()} devs={torch.cuda.device_count()}')"
        # ── 실행 ────────────────────────────────────────────────────────
        echo "[lstm] phase=$${LSTM_PHASE} extra=$${LSTM_EXTRA}"
        if [ "$${LSTM_PHASE}" = "all" ]; then
          $$VENV_PY -m Sources.vppm.lstm_single.run --all $${LSTM_EXTRA}
        else
          $$VENV_PY -m Sources.vppm.lstm_single.run --phase $${LSTM_PHASE} $${LSTM_EXTRA}
        fi
        echo "[lstm] Done. Results → Sources/pipeline_outputs/experiments/vppm_lstm_single/results/"
