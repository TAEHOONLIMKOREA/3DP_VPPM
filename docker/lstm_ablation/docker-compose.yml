# VPPM-LSTM-Ablation 카메라 분기 ablation 실험 —
#   E1 (no_v0): visible/0 분기 제거, visible/1 + sensor + dscnn + cad_patch + scan_patch 유지
#   E2 (no_cameras): visible/0 + visible/1 분기 모두 제거
# 풀-스택 모델 (lstm_dual_img_16_dscnn_8_cad_8_scan_8_1dcnn_sensor_4) 의 모든 캐시를 재사용.
# 산출물 → Sources/pipeline_outputs/experiments/lstm_ablation/{E1_no_v0, E2_no_cameras}/
#
# 사전조건:
#   - Sources/pipeline_outputs/features/all_features.npz
#   - Sources/pipeline_outputs/experiments/vppm_lstm/cache/crop_stacks_B1.*.h5              (v0 캐시)
#   - Sources/pipeline_outputs/experiments/vppm_lstm_dual/cache/crop_stacks_v1_B1.*.h5     (v1 캐시)
#   - Sources/pipeline_outputs/experiments/vppm_lstm_dual_img_4_sensor_7/cache/sensor_stacks_B1.*.h5
#   - Sources/pipeline_outputs/experiments/vppm_lstm_dual_img_4_sensor_7_dscnn_8/cache/dscnn_stacks_B1.*.h5
#   - Sources/pipeline_outputs/experiments/vppm_lstm_dual_img_16_dscnn_8_cad_8_scan_8_1dcnn_sensor_4/cache/  (cad/scan 캐시)
#   - Sources/pipeline_outputs/experiments/lstm_ablation/E1_no_v0/                          (rw, 미리 생성)
#   - Sources/pipeline_outputs/experiments/lstm_ablation/E2_no_cameras/                     (rw, 미리 생성)
#
# 사용법:
#
#   cd docker/lstm_ablation
#   docker compose up -d --build               # E1 + E2 동시 백그라운드 실행
#   docker compose up -d --build e1            # E1 만 실행
#   docker compose up -d --build e2            # E2 만 실행
#   docker compose logs -f                     # 로그 실시간 확인
#   docker compose down                        # 정리
#
# 단계/GPU 변경:
#   NVIDIA_VISIBLE_DEVICES=1 docker compose up -d --build e1
#   NVIDIA_VISIBLE_DEVICES=2 docker compose up -d --build e2
#   LSTM_ABLATION_EXTRA=--quick docker compose up -d --build e1
x-common: &common
  build:
    context: ../..
    dockerfile: docker/lstm_ablation/Dockerfile
  image: vppm-lstm-ablation:gpu
  runtime: nvidia
  user: "${UID_GID:-1000:1000}"
  restart: "no"
  shm_size: "4gb"
  working_dir: /workspace
  volumes:
    - /etc/passwd:/etc/passwd:ro
    - /etc/group:/etc/group:ro
    - ../../venv:/workspace/venv:ro
    # baseline features (입력) - read-only
    - ../../Sources/pipeline_outputs/features:/workspace/Sources/pipeline_outputs/features:ro
    # visible/0 캐시 (입력) - read-only
    - ../../Sources/pipeline_outputs/experiments/vppm_lstm:/workspace/Sources/pipeline_outputs/experiments/vppm_lstm:ro
    # visible/1 캐시 (입력) - read-only
    - ../../Sources/pipeline_outputs/experiments/vppm_lstm_dual:/workspace/Sources/pipeline_outputs/experiments/vppm_lstm_dual:ro
    # sensor 캐시 (입력) - read-only
    - ../../Sources/pipeline_outputs/experiments/vppm_lstm_dual_img_4_sensor_7:/workspace/Sources/pipeline_outputs/experiments/vppm_lstm_dual_img_4_sensor_7:ro
    # dscnn 캐시 (입력) - read-only
    - ../../Sources/pipeline_outputs/experiments/vppm_lstm_dual_img_4_sensor_7_dscnn_8:/workspace/Sources/pipeline_outputs/experiments/vppm_lstm_dual_img_4_sensor_7_dscnn_8:ro
    # cad_patch / scan_patch 캐시 — 풀-스택 실험에서 빌드된 것 재사용 (입력) - read-only
    - ../../Sources/pipeline_outputs/experiments/vppm_lstm_dual_img_16_dscnn_8_cad_8_scan_8_1dcnn_sensor_4:/workspace/Sources/pipeline_outputs/experiments/vppm_lstm_dual_img_16_dscnn_8_cad_8_scan_8_1dcnn_sensor_4:ro

services:
  e1:
    <<: *common
    environment:
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-1}
      - PYTHONPATH=/workspace
      - HOME=/tmp
      - LSTM_ABLATION_EXTRA=${LSTM_ABLATION_EXTRA:-}               # e.g. "--quick"
    volumes:
      - /etc/passwd:/etc/passwd:ro
      - /etc/group:/etc/group:ro
      - ../../venv:/workspace/venv:ro
      - ../../Sources/pipeline_outputs/features:/workspace/Sources/pipeline_outputs/features:ro
      - ../../Sources/pipeline_outputs/experiments/vppm_lstm:/workspace/Sources/pipeline_outputs/experiments/vppm_lstm:ro
      - ../../Sources/pipeline_outputs/experiments/vppm_lstm_dual:/workspace/Sources/pipeline_outputs/experiments/vppm_lstm_dual:ro
      - ../../Sources/pipeline_outputs/experiments/vppm_lstm_dual_img_4_sensor_7:/workspace/Sources/pipeline_outputs/experiments/vppm_lstm_dual_img_4_sensor_7:ro
      - ../../Sources/pipeline_outputs/experiments/vppm_lstm_dual_img_4_sensor_7_dscnn_8:/workspace/Sources/pipeline_outputs/experiments/vppm_lstm_dual_img_4_sensor_7_dscnn_8:ro
      - ../../Sources/pipeline_outputs/experiments/vppm_lstm_dual_img_16_dscnn_8_cad_8_scan_8_1dcnn_sensor_4:/workspace/Sources/pipeline_outputs/experiments/vppm_lstm_dual_img_16_dscnn_8_cad_8_scan_8_1dcnn_sensor_4:ro
      # E1 산출물 - rw
      - ../../Sources/pipeline_outputs/experiments/lstm_ablation:/workspace/Sources/pipeline_outputs/experiments/lstm_ablation:rw
    command:
      - sh
      - -c
      - |
        set -e
        VENV_PY=/workspace/venv/bin/python
        EXP=lstm_ablation_E1
        # ── 사전 검증 ──────────────────────────────────────────────────
        if [ ! -x "$$VENV_PY" ]; then
          echo "[$$EXP] FATAL: $$VENV_PY 없음 — 호스트 venv 가 마운트되지 않았습니다" >&2
          exit 1
        fi
        if [ ! -f /workspace/Sources/pipeline_outputs/features/all_features.npz ]; then
          echo "[$$EXP] FATAL: all_features.npz 없음 — baseline 피처 추출 먼저 완료해야 합니다" >&2
          exit 1
        fi
        V0_CACHE=/workspace/Sources/pipeline_outputs/experiments/vppm_lstm/cache
        if [ ! -d "$$V0_CACHE" ] || [ -z "$$(ls -A $$V0_CACHE/crop_stacks_B1.*.h5 2>/dev/null)" ]; then
          echo "[$$EXP] FATAL: visible/0 캐시 없음 ($$V0_CACHE)" >&2
          exit 1
        fi
        V1_CACHE=/workspace/Sources/pipeline_outputs/experiments/vppm_lstm_dual/cache
        if [ ! -d "$$V1_CACHE" ] || [ -z "$$(ls -A $$V1_CACHE/crop_stacks_v1_B1.*.h5 2>/dev/null)" ]; then
          echo "[$$EXP] FATAL: visible/1 캐시 없음 ($$V1_CACHE)" >&2
          exit 1
        fi
        SENSOR_CACHE=/workspace/Sources/pipeline_outputs/experiments/vppm_lstm_dual_img_4_sensor_7/cache
        if [ ! -d "$$SENSOR_CACHE" ] || [ -z "$$(ls -A $$SENSOR_CACHE/sensor_stacks_B1.*.h5 2>/dev/null)" ]; then
          echo "[$$EXP] FATAL: sensor 캐시 없음 ($$SENSOR_CACHE)" >&2
          exit 1
        fi
        DSCNN_CACHE=/workspace/Sources/pipeline_outputs/experiments/vppm_lstm_dual_img_4_sensor_7_dscnn_8/cache
        if [ ! -d "$$DSCNN_CACHE" ] || [ -z "$$(ls -A $$DSCNN_CACHE/dscnn_stacks_B1.*.h5 2>/dev/null)" ]; then
          echo "[$$EXP] FATAL: dscnn 캐시 없음 ($$DSCNN_CACHE)" >&2
          exit 1
        fi
        FULL86_CACHE=/workspace/Sources/pipeline_outputs/experiments/vppm_lstm_dual_img_16_dscnn_8_cad_8_scan_8_1dcnn_sensor_4/cache
        if [ ! -d "$$FULL86_CACHE" ] || [ -z "$$(ls -A $$FULL86_CACHE/cad_patch_stacks_B1.*.h5 2>/dev/null)" ]; then
          echo "[$$EXP] FATAL: cad_patch 캐시 없음 ($$FULL86_CACHE) — 먼저 docker/lstm_dual_img_16_dscnn_8_cad_8_scan_8_1dcnn_sensor_4 로 cache_cad_patch 단계 실행하세요" >&2
          exit 1
        fi
        if [ -z "$$(ls -A $$FULL86_CACHE/scan_patch_stacks_B1.*.h5 2>/dev/null)" ]; then
          echo "[$$EXP] FATAL: scan_patch 캐시 없음 ($$FULL86_CACHE) — 먼저 docker/lstm_dual_img_16_dscnn_8_cad_8_scan_8_1dcnn_sensor_4 로 cache_scan_patch 단계 실행하세요" >&2
          exit 1
        fi
        OUT=/workspace/Sources/pipeline_outputs/experiments/lstm_ablation/E1_no_v0
        if [ ! -d "$$OUT" ]; then
          echo "[$$EXP] FATAL: $$OUT 가 마운트되지 않음 (rw 필요)" >&2
          exit 1
        fi
        if ! touch "$$OUT/.write_test" 2>/dev/null; then
          echo "[$$EXP] FATAL: $$OUT 쓰기 실패 — UID/권한 확인" >&2
          exit 1
        fi
        rm -f "$$OUT/.write_test"
        mkdir -p "$$OUT/models" "$$OUT/results" "$$OUT/features"
        $$VENV_PY -c "import torch,sys;print(f'[$$EXP] python={sys.version.split()[0]} torch={torch.__version__} cuda={torch.cuda.is_available()} devs={torch.cuda.device_count()}')"
        # ── 실행 ──────────────────────────────────────────────────────
        echo "[$$EXP] extra=$${LSTM_ABLATION_EXTRA}"
        $$VENV_PY -m Sources.vppm.lstm_ablation.run --experiment E1 $${LSTM_ABLATION_EXTRA}
        echo "[$$EXP] Done. Results → Sources/pipeline_outputs/experiments/lstm_ablation/E1_no_v0/results/"

