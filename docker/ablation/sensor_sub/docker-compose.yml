# 센서 서브 채널 ablation (E14–E22).
# 기존 docker/ablation/Dockerfile 을 공유하며, 어느 실험을 돌릴지는
# EXPERIMENT_ID / NVIDIA_VISIBLE_DEVICES 환경변수로 제어한다.
#
# 사용 예:
#   EXPERIMENT_ID=E17 NVIDIA_VISIBLE_DEVICES=0 docker compose run --rm ablation-sensor-sub
#
# 보통은 같은 디렉터리의 run.sh / run_all.sh 로 호출한다.
services:
  ablation-sensor-sub:
    build:
      context: ../../..
      dockerfile: docker/ablation/Dockerfile
    image: vppm-ablation:gpu          # E1~E4 와 동일 이미지 공유
    runtime: nvidia
    user: "${UID_GID:-1000:1000}"
    environment:
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-0}
      - PYTHONPATH=/workspace
      - HOME=/tmp
      - EXPERIMENT_ID=${EXPERIMENT_ID:?EXPERIMENT_ID 를 지정하세요 (E14~E22)}
    volumes:
      - /etc/passwd:/etc/passwd:ro
      - /etc/group:/etc/group:ro
      - ../../../venv:/workspace/venv:ro
      - ../../../Sources/pipeline_outputs/features:/workspace/Sources/pipeline_outputs/features:ro
      - ../../../Sources/pipeline_outputs/results:/workspace/Sources/pipeline_outputs/results:ro
      - ../../../Sources/pipeline_outputs/ablation:/workspace/Sources/pipeline_outputs/ablation:rw
    shm_size: "2gb"
    working_dir: /workspace
    command:
      - sh
      - -c
      - "exec /workspace/venv/bin/python -m Sources.vppm.ablation.run --experiment ${EXPERIMENT_ID} ${ABLATION_EXTRA:-}"
