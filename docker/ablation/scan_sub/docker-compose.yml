# 스캔(G4) 서브 채널 ablation (E31~E33).
# 기존 docker/ablation/Dockerfile 을 공유하며, EXPERIMENT_ID / NVIDIA_VISIBLE_DEVICES
# 환경변수로 어느 실험을 돌릴지 선택한다.
#
# 전제 — README.md 참조
#  1) Sources/vppm/origin/scan_features.py 구현 완료
#  2) Sources/pipeline_outputs/features/all_features.npz 를 v2 (실구현 #20/#21) 로 재추출 완료
#  3) Baseline v2 (E30, 21-feat) 학습 완료 → pipeline_outputs/results/vppm_origin/
#
# 사용 예:
#   EXPERIMENT_ID=E32 NVIDIA_VISIBLE_DEVICES=0 docker compose run --rm ablation-scan-sub
#
# 보통은 같은 디렉터리의 run.sh / run_all.sh 로 호출한다.
services:
  ablation-scan-sub:
    build:
      context: ../../..
      dockerfile: docker/ablation/Dockerfile
    image: vppm-ablation:gpu          # E1~E4, E13~E22 와 동일 이미지 공유
    runtime: nvidia
    user: "${UID_GID:-1000:1000}"
    environment:
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-0}
      - PYTHONPATH=/workspace
      - HOME=/tmp
      - EXPERIMENT_ID=${EXPERIMENT_ID:?EXPERIMENT_ID 를 지정하세요 (E31~E33)}
    volumes:
      - /etc/passwd:/etc/passwd:ro
      - /etc/group:/etc/group:ro
      - ../../../venv:/workspace/venv:ro
      - ../../../Sources/pipeline_outputs/features:/workspace/Sources/pipeline_outputs/features:ro
      - ../../../Sources/pipeline_outputs/results:/workspace/Sources/pipeline_outputs/results:ro
      - ../../../Sources/pipeline_outputs/ablation:/workspace/Sources/pipeline_outputs/ablation:rw
    shm_size: "2gb"
    working_dir: /workspace
    command:
      - sh
      - -c
      - "exec /workspace/venv/bin/python -m Sources.vppm.ablation.run --experiment ${EXPERIMENT_ID} ${ABLATION_EXTRA:-}"
